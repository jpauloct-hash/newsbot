name: Scrape News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - run: python scraper/main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: https://jpauloct-hash.github.io/newsbot
      - run: |
          git config user.email "bot@newsbot.com"
          git config user.name "NewsBot"
          git add data/news.json data/news.db feed.xml
          git diff --staged --quiet && echo "Sem mudancas." || git commit -m "Atualizado $(date +'%d/%m/%Y %H:%M')"
          git push
